<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB3IN8jxN7HZsN8ZyfHXlZBu5wxqTxgho8",
      authDomain: "picoto-park.firebaseapp.com",
      projectId: "picoto-park",
      storageBucket: "picoto-park.firebasestorage.app",
      messagingSenderId: "984525425586",
      appId: "1:984525425586:web:b7f3c6a8bffc392844f2ab"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userGlobal = null;

    // 🔥 ESPERA PELO LOGIN (FIX PRINCIPAL)
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        document.body.innerHTML = "Não autenticado";
        return;
      }

      userGlobal = user;

      const snap = await getDoc(doc(db, "users", user.uid));

      if (snap.exists()) {
        document.getElementById("nome").value = snap.data().nome || "";
      }

      document.getElementById("loading").style.display = "none";
      document.getElementById("conteudo").style.display = "block";
    });

    // 💾 GUARDAR
    window.guardarNome = async function () {
      const nome = document.getElementById("nome").value.trim();

      await setDoc(
        doc(db, "users", userGlobal.uid),
        { nome: nome },
        { merge: true }
      );

      alert("Nome atualizado!");

      // 🔥 ATUALIZA NOME NO DASHBOARD
      parent.location.reload();
    };
  </script>
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">

  <h2>Perfil</h2>

  <!-- LOADING -->
  <div id="loading">A carregar...</div>

  <!-- CONTEÚDO -->
  <div id="conteudo" style="display:none;">

    <!-- FOTO -->
    <div style="
      width:100px;
      height:100px;
      border-radius:50%;
      background:#ddd;
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
    ">
      👤
    </div>

    <br>

    <!-- INPUT -->
    <input 
      id="nome" 
      placeholder="Nome"
      style="padding:10px;width:250px;border-radius:10px;border:1px solid #ccc;"
    />

    <br><br>

    <!-- BOTÃO -->
    <button onclick="guardarNome()" style="
      padding:10px 25px;
      border:none;
      border-radius:10px;
      background:#6200ea;
      color:white;
      cursor:pointer;
    ">
      Guardar
    </button>

  </div>

</body>
</html>
