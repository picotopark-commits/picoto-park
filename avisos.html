<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avisos</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  margin: 0;
  color: white;
}

.titulo {
  font-size: 40px;
  font-weight: bold;
  background: linear-gradient(45deg, #42a5f5, #1976d2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 20px;
}

#grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.img-box {
  position: relative;
  background: rgba(0,0,0,0.5);
  border-radius: 10px;
  padding-bottom: 10px;
}

.img-box img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  cursor: pointer;
  border-radius: 10px 10px 0 0;
}

.descricao {
  padding: 10px;
  font-size: 14px;
}

.delete-btn {
  position: absolute;
  top: 5px;
  right: 5px;
}

.add-btn {
  padding: 12px 25px;
  background: linear-gradient(45deg, #1976d2, #42a5f5);
  color: white;
  border: none;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#modal img {
  max-width: 90%;
  max-height: 90%;
}

#modal span {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2 class="titulo">Avisos</h2>

<input type="text" id="descricaoInput" placeholder="Escreve uma descrição...">

<br><br>

<button id="addBtn" class="add-btn" onclick="fileInput.click()">+ Adicionar</button>
<input type="file" id="fileInput" hidden>

<div id="grid"></div>

<div id="modal">
  <span onclick="fecharModal()">✖</span>
  <img id="imgGrande">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* 🔑 CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB3IN8jxN7HZsN8ZyfHXlZBu5wxqTxgho8",
  authDomain: "picoto-park.firebaseapp.com",
  projectId: "picoto-park",
  storageBucket: "picoto-park.firebasestorage.app",
  messagingSenderId: "984525425586",
  appId: "1:984525425586:web:b7f3c6a8bffc392844f2ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 🔐 ADMIN EMAIL */
const ADMIN_EMAIL = "picotopark@gmail.com";
let isAdmin = false;

onAuthStateChanged(auth, (user) => {
  if (user && user.email === ADMIN_EMAIL) {
    isAdmin = true;
    document.getElementById("addBtn").style.display = "inline-block";
  } else {
    isAdmin = false;
    document.getElementById("addBtn").style.display = "none";
  }
});

/* CLOUDINARY */
const CLOUD_NAME = "dhocrzi6t";
const UPLOAD_PRESET = "flutter_upload";

const grid = document.getElementById("grid");
const fileInput = document.getElementById("fileInput");
const descricaoInput = document.getElementById("descricaoInput");
const modal = document.getElementById("modal");

/* TEMPO REAL */
onSnapshot(collection(db, "avisos"), (snapshot) => {
  grid.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    criarAviso(data.url, data.descricao, docSnap.id);
  });
});

/* UPLOAD */
fileInput.addEventListener("change", async (event) => {
  if (!isAdmin) return;

  const file = event.target.files[0];
  if (!file) return;

  const descricao = descricaoInput.value;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
    { method: "POST", body: formData }
  );

  const data = await res.json();

  await addDoc(collection(db, "avisos"), {
    url: data.secure_url,
    descricao: descricao,
    createdAt: Date.now()
  });

  descricaoInput.value = "";
});

/* UI */
function criarAviso(url, descricao, id) {
  const box = document.createElement("div");
  box.className = "img-box";

  const img = document.createElement("img");
  img.src = url;
  img.onclick = () => abrirImagem(url);

  const texto = document.createElement("div");
  texto.className = "descricao";
  texto.textContent = descricao;

  box.appendChild(img);
  box.appendChild(texto);

  if (isAdmin) {
    const btn = document.createElement("button");
    btn.textContent = "🗑️";
    btn.className = "delete-btn";

    btn.onclick = async (e) => {
      e.stopPropagation();
      await deleteDoc(doc(db, "avisos", id));
    };

    box.appendChild(btn);
  }

  grid.appendChild(box);
}

/* MODAL */
function abrirImagem(src) {
  modal.style.display = "flex";
  document.getElementById("imgGrande").src = src;
}

modal.addEventListener("click", (e) => {
  if (e.target === modal) fecharModal();
});

function fecharModal() {
  modal.style.display = "none";
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") fecharModal();
});
</script>

</body>
</html>
