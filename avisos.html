<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avisos</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  margin: 0;
  color: white;
}

#grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.img-box {
  position: relative;
  background: rgba(0,0,0,0.5);
  border-radius: 10px;
  padding-bottom: 10px;
}

.img-box img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  cursor: pointer;
  border-radius: 10px 10px 0 0;
}

.descricao {
  padding: 10px;
  font-size: 14px;
}

.delete-btn {
  position: absolute;
  top: 5px;
  right: 5px;
}

/* botão */
.add-btn {
  padding: 12px 25px;
  background: linear-gradient(45deg, #1976d2, #42a5f5);
  color: white;
  border: none;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

/* input */
input[type="text"] {
  padding: 10px;
  width: 250px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<h2>Avisos</h2>

<!-- 🆕 DESCRIÇÃO -->
<input type="text" id="descricaoInput" placeholder="Escreve uma descrição...">

<br>

<button class="add-btn" onclick="fileInput.click()">+ Adicionar</button>
<input type="file" id="fileInput" hidden>

<div id="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3IN8jxN7HZsN8ZyfHXlZBu5wxqTxgho8",
  authDomain: "picoto-park.firebaseapp.com",
  projectId: "picoto-park",
  storageBucket: "picoto-park.firebasestorage.app",
  messagingSenderId: "984525425586",
  appId: "1:984525425586:web:b7f3c6a8bffc392844f2ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const CLOUD_NAME = "dhocrzi6t";
const UPLOAD_PRESET = "flutter_upload";

const grid = document.getElementById("grid");
const fileInput = document.getElementById("fileInput");
const descricaoInput = document.getElementById("descricaoInput");

/* 🔄 TEMPO REAL */
onSnapshot(collection(db, "avisos"), (snapshot) => {
  grid.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    criarAviso(data.url, data.descricao, docSnap.id);
  });
});

/* ➕ UPLOAD */
fileInput.addEventListener("change", async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const descricao = descricaoInput.value;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
    { method: "POST", body: formData }
  );

  const data = await res.json();

  await addDoc(collection(db, "avisos"), {
    url: data.secure_url,
    descricao: descricao,
    createdAt: Date.now()
  });

  descricaoInput.value = ""; // limpar input
});

/* 🧱 UI */
function criarAviso(url, descricao, id) {
  const box = document.createElement("div");
  box.className = "img-box";

  const img = document.createElement("img");
  img.src = url;

  const texto = document.createElement("div");
  texto.className = "descricao";
  texto.innerText = descricao;

  const btn = document.createElement("button");
  btn.innerHTML = "🗑️";
  btn.className = "delete-btn";

  btn.onclick = async (e) => {
    e.stopPropagation();
    await deleteDoc(doc(db, "avisos", id));
  };

  box.appendChild(img);
  box.appendChild(texto);
  box.appendChild(btn);
  grid.appendChild(box);
}
</script>

</body>
</html>
