<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Planificação</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  margin: 0;
  color: white;
}

#grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.img-box {
  position: relative;
}

.img-box img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.delete-btn {
  position: absolute;
  top: 5px;
  right: 5px;
}
</style>
</head>

<body>

<h2>Planificação</h2>

<button onclick="fileInput.click()">Adicionar</button>
<input type="file" id="fileInput" hidden>

<div id="grid"></div>

<!-- 🔥 SCRIPT NO FINAL (IMPORTANTE) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔑 CONFIG FIREBASE (METE O TEU REAL) */
const firebaseConfig = {
  apiKey: "AIzaSyB3IN8jxN7HZsN8ZyfHXlZBu5wxqTxgho8",
  authDomain: "picoto-park.firebaseapp.com",
  projectId: "picoto-park",
  storageBucket: "picoto-park.firebasestorage.app",
  messagingSenderId: "984525425586",
  appId: "1:984525425586:web:b7f3c6a8bffc392844f2ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ☁️ CLOUDINARY */
const CLOUD_NAME = "dhocrzi6t";
const UPLOAD_PRESET = "flutter_upload";

/* 📦 ELEMENTOS (AGORA JÁ EXISTEM) */
const grid = document.getElementById("grid");
const fileInput = document.getElementById("fileInput");

/* 📡 TEMPO REAL */
onSnapshot(collection(db, "imagens"), (snapshot) => {
  grid.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    criarImagem(data.url, docSnap.id);
  });
});

/* ➕ UPLOAD */
fileInput.addEventListener("change", async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
    { method: "POST", body: formData }
  );

  const data = await res.json();

  await addDoc(collection(db, "imagens"), {
    url: data.secure_url,
    createdAt: Date.now()
  });
});

/* 🧱 UI */
function criarImagem(url, id) {
  const box = document.createElement("div");
  box.className = "img-box";

  const img = document.createElement("img");
  img.src = url;

  const btn = document.createElement("button");
  btn.innerHTML = "🗑️";
  btn.className = "delete-btn";

  btn.onclick = async (e) => {
    e.stopPropagation();
    await deleteDoc(doc(db, "imagens", id));
  };

  box.appendChild(img);
  box.appendChild(btn);
  grid.appendChild(box);
}
</script>

</body>
</html>
