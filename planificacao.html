<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificação</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  margin: 0;
  color: white;
}

#grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.img-box {
  position: relative;
}

.img-box img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  cursor: pointer;
}

.delete-btn {
  position: absolute;
  top: 5px;
  right: 5px;
}

/* 🔥 BOTÃO BONITO */
.add-btn {
  padding: 12px 25px;
  background: linear-gradient(45deg, #1976d2, #42a5f5);
  color: white;
  border: none;
  border-radius: 25px;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.add-btn:hover {
  transform: scale(1.05);
}

/* 🔍 MODAL */
#modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

#modal span {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Planificação</h2>

<!-- 🔥 ADICIONEI ID -->
<button id="addBtn" class="add-btn" onclick="fileInput.click()">+ Adicionar</button>

<input type="file" id="fileInput" hidden>

<div id="grid"></div>

<!-- 🔍 MODAL -->
<div id="modal">
  <span onclick="fecharModal()">✖</span>
  <img id="imgGrande" onclick="event.stopPropagation()">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔐 AUTH */
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* 🔑 CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyB3IN8jxN7HZsN8ZyfHXlZBu5wxqTxgho8",
  authDomain: "picoto-park.firebaseapp.com",
  projectId: "picoto-park",
  storageBucket: "picoto-park.firebasestorage.app",
  messagingSenderId: "984525425586",
  appId: "1:984525425586:web:b7f3c6a8bffc392844f2ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 👑 DEFINE ADMIN */
const ADMIN_EMAILS = [
  "picotopark@gmail.com",
  "rubenmoreira6666@gmail.com",
  "aritarmachado4@gmail.com",
  "caleiro.francisco@gmail.com",
  "naosei@gmail.com"
];
let isAdmin = false;

/* 📦 ELEMENTOS */
const grid = document.getElementById("grid");
const fileInput = document.getElementById("fileInput");
const modal = document.getElementById("modal");
const addBtn = document.getElementById("addBtn");

/* 🔐 VERIFICAR LOGIN */
onAuthStateChanged(auth, (user) => {
  if (user && ADMIN_EMAILS.includes(user.email)) {
    isAdmin = true;
  } else {
    isAdmin = false;
  }

  controlarUI();
});

/* 🎯 CONTROLAR UI */
function controlarUI() {
  if (!isAdmin) {
    addBtn.style.display = "none";
  } else {
    addBtn.style.display = "inline-block";
  }
}

/* 📡 TEMPO REAL */
onSnapshot(collection(db, "imagens"), (snapshot) => {
  grid.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    criarImagem(data.url, docSnap.id);
  });
});

/* ➕ UPLOAD */
fileInput.addEventListener("change", async (event) => {

  if (!isAdmin) {
    alert("Sem permissão!");
    return;
  }

  const file = event.target.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "flutter_upload");

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/dhocrzi6t/image/upload`,
    { method: "POST", body: formData }
  );

  const data = await res.json();

  await addDoc(collection(db, "imagens"), {
    url: data.secure_url,
    createdAt: Date.now()
  });
});

/* 🧱 UI */
function criarImagem(url, id) {
  const box = document.createElement("div");
  box.className = "img-box";

  const img = document.createElement("img");
  img.src = url;
  img.onclick = () => abrirImagem(url);

  box.appendChild(img);

  /* 🔥 BOTÃO SÓ PARA ADMIN */
  if (isAdmin) {
    const btn = document.createElement("button");
    btn.innerHTML = "🗑️";
    btn.className = "delete-btn";

    btn.onclick = async (e) => {
      e.stopPropagation();
      await deleteDoc(doc(db, "imagens", id));
    };

    box.appendChild(btn);
  }

  grid.appendChild(box);
}

/* 🔍 MODAL FUNÇÕES */
function abrirImagem(src) {
  modal.style.display = "flex";
  document.getElementById("imgGrande").src = src;
}

/* clicar fora fecha */
modal.addEventListener("click", () => fecharModal());

function fecharModal() {
  modal.style.display = "none";
}

/* tecla ESC fecha */
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    fecharModal();
  }
});
</script>

</body>
</html>
