<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Gráficos 📊</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: transparent;
      margin: 0;
      color: white;
    }

    header {
      background: rgba(25, 118, 210, 0.7);
      backdrop-filter: blur(6px);
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    .container {
      padding: 20px;
    }

    h3 {
      text-shadow: 0 2px 5px rgba(0,0,0,0.7);
      margin-top: 30px;
    }

    canvas {
      background: rgba(255,255,255,0.15);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

<header>Gráficos 📊</header>

<div class="container">
  <h3>📅 Últimos 7 dias</h3>
  <canvas id="semana"></canvas>

  <h3>📆 Este mês</h3>
  <canvas id="mes"></canvas>

  <h3>📊 Este ano</h3>
  <canvas id="ano"></canvas>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB3IN8jxN7HZsN8ZyfHXlZBu5wxqTxgho8",
  authDomain: "picoto-park.firebaseapp.com",
  projectId: "picoto-park",
  storageBucket: "picoto-park.firebasestorage.app",
  messagingSenderId: "984525425586",
  appId: "1:984525425586:web:b7f3c6a8bffc392844f2ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔥 CARREGAR DADOS
async function carregarDados() {

  const user = auth.currentUser;

  if (!user) {
    alert("Precisas de login primeiro");
    return;
  }

  const snapshot = await getDocs(
    collection(db, "users", user.uid, "turnos")
  );

  const now = new Date();

  let semana = {};
  let mes = {};
  let ano = {};

  snapshot.forEach(doc => {
    const data = doc.data();

    if (!data.entrada || !data.saida) return;

    const entrada = data.entrada.toDate();
    const horas = data.horas || 0;

    // 📅 SEMANA
    if (entrada > new Date(now - 7 * 24 * 60 * 60 * 1000)) {
      const key = entrada.getDate() + "/" + (entrada.getMonth() + 1);
      semana[key] = (semana[key] || 0) + horas;
    }

    // 📆 MÊS
    if (
      entrada.getMonth() === now.getMonth() &&
      entrada.getFullYear() === now.getFullYear()
    ) {
      const key = entrada.getDate();
      mes[key] = (mes[key] || 0) + horas;
    }

    // 📊 ANO
    if (entrada.getFullYear() === now.getFullYear()) {
      const key = entrada.getMonth() + 1;
      ano[key] = (ano[key] || 0) + horas;
    }
  });

  criarGrafico("semana", semana);
  criarGrafico("mes", mes);
  criarGrafico("ano", ano);
}

// 📊 CRIAR GRÁFICO
function criarGrafico(id, dados) {
  const labels = Object.keys(dados);
  const valores = Object.values(dados);

  new Chart(document.getElementById(id), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Horas",
        data: valores
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: {
            color: "white"
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: "white"
          }
        },
        y: {
          ticks: {
            color: "white"
          }
        }
      }
    }
  });
}

// 🔥 ESPERAR LOGIN
auth.onAuthStateChanged(user => {
  if (user) {
    carregarDados();
  }
});

</script>

</body>
</html>
